<div class="min-vh-100 d-flex align-items-center justify-content-center">
  <div class="card shadow-lg p-4 animate__animated animate__fadeInUp"
       style="width: 100%; max-width: 400px;">

    <div class="text-center mb-3 animate__animated animate__bounceIn">
      <img
        src="/logoPokemon.png"
        alt="Pokemon Logo"
        style="width: 200px; object-fit: contain;"
      />
    </div>

    <h2 class="text-center fw-bold mb-1">Registrarse</h2>
    <p class="text-center text-muted mb-4">Creá tu cuenta para empezar</p>

    <div class="mb-3">
      <label class="form-label fw-semibold">Usuario</label>
      <input
        type="text"
        class="form-control"
        [class.is-invalid]="submitted && !username"
        [(ngModel)]="username"
        placeholder="Elegí un nombre de usuario"
      />
      <div class="invalid-feedback">El usuario es obligatorio</div>
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold">Contraseña</label>
      <input
        type="password"
        class="form-control"
        [class.is-invalid]="submitted && !password"
        [(ngModel)]="password"
        placeholder="Elegí una contraseña"
      />
      <div class="invalid-feedback">La contraseña es obligatoria</div>
    </div>

    <div class="mb-4">
      <label class="form-label fw-semibold">Confirmar contraseña</label>
      <input
        type="password"
        class="form-control"
        [class.is-invalid]="submitted && !confirmar"
        [(ngModel)]="confirmar"
        placeholder="Repetí la contraseña"
      />
      <div class="invalid-feedback">Confirmá tu contraseña</div>
    </div>

    <button
      class="btn btn-primary w-100 mb-3 fw-bold"
      (click)="registrar()">
      CREAR CUENTA
    </button>

    <p class="text-center mb-0">
      ¿Ya tenés cuenta?
      <a routerLink="/login" class="text-primary fw-semibold">Iniciá sesión</a>
    </p>

  </div>
</div>
