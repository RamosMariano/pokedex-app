<div class="spinner-container" *ngIf="loading">
  <app-spinner></app-spinner>
</div>

<!-- Contenido -->
<div class="detail-container animate__animated animate__zoomIn" *ngIf="!loading && pokemon">

  <button class="btn btn-outline-secondary mb-3" (click)="volver()">
    ← Volver
  </button>

  <div class="detail-card">

    <div class="detail-header text-center">
      <h1 class="pokemon-name">
        {{ pokemon.name }}
        <button class="btn btn-sm btn-outline-secondary ms-2" (click)="reproducirSonido()">
          🔊 <!-- extra: boton para reproducir sonido de pokemon al lado del nombre -->
        </button>
      </h1>
      <span class="pokemon-id">#{{ pokemon.id }}</span>
      <img [src]="imagenActual" [alt]="pokemon.name" class="pokemon-img animate__animated animate__swing animate__infinite"/>
      <div class="mt-2">
        <button class="btn btn-sm btn-outline-secondary" (click)="toggleShiny()">
          {{ mostrandoShiny ? '◀ Ver versión Normal' : 'Ver versión Shiny ✨' }}
        </button>
      </div>
      <!-- Badges de tipo -->
      <div class="d-flex justify-content-center gap-2 mt-2">
        <span *ngFor="let tipo of tipos" class="type-badge {{ tipo.name }} animate__animated animate__fadeInLeft">
          {{ tipo.name }}
        </span>
      </div>
    </div>
    <div class="detail-info d-flex justify-content-center gap-4 mt-3">
      <div class="info-item text-center">
        <span class="info-label">Altura</span>
        <span class="info-value">{{ pokemon.height / 10 }} m</span>
      </div>
      <div class="info-item text-center">
        <span class="info-label">Peso</span>
        <span class="info-value">{{ pokemon.weight / 10 }} kg</span>
      </div>
      <div class="info-item text-center">
        <span class="info-label">Experiencia base</span>
        <span class="info-value">{{ pokemon.base_experience }}</span>
      </div>
    </div>


    <div class="detail-section mt-4">
      <h4>Habilidades</h4>
      <div class="d-flex flex-wrap gap-2">
        <span
          *ngFor="let habilidad of habilidades"
          class="badge bg-secondary text-capitalize">
          {{ habilidad.ability.name }}
          <span *ngIf="habilidad.is_hidden" class="ms-1 fst-italic">(oculta)</span>
        </span>
      </div>
    </div>

    <div class="detail-section mt-4">
      <h4>Estadisticas</h4>
      <div *ngFor="let stat of stats" class="mb-2">
        <div class="d-flex justify-content-between">
          <span class="stat-name text-capitalize">{{ stat.name }}</span>
          <span class="stat-value">{{ stat.value }}</span>
        </div>
        <div class="stat-bar">
          <div class="stat-fill" [style.width.%]="stat.percentage"></div>
        </div>
      </div>
      <canvas id="radarChart" class="mt-3"></canvas>
    </div>

    <!-- Botones -->
    <div class="d-flex gap-2 mt-4">
      <button class="btn w-100 fw-semibold"
        *ngIf="userService.estaLogueado()"
        [class.btn-success]="!estaEnEquipo"
        [class.btn-danger]="estaEnEquipo"
        (click)="toggleEquipo()">
        {{ estaEnEquipo ? '✖ Quitar del equipo' : '+ Mi Equipo' }}
      </button>
      <button class="btn w-100 fw-semibold"
        *ngIf="userService.estaLogueado()"
        [class.btn-outline-danger]="!esFavorito"
        [class.btn-danger]="esFavorito"
        (click)="toggleFavorito()">
        {{ esFavorito ? '❤️ Quitar de favoritos' : '🤍 Agregar a favoritos' }}
      </button>
    </div>

  </div>
</div>
