<div class="page">

    @if(pokeFavs.length === 0) 
    {
        <div class="empty-state">
            <div class="pokeQue">
               <img src="assets/img/pokeQue.png" alt="?!">
            </div>

            <h2 class="title">Aun no has agregado tus favoritos!</h2>

            <p>Agrega tus pokemon preferidos dandole clic al corazon en la pokedex.</p>
        </div>
    }
    @else
    {
        <div class="pokemon-grid">
            @for(pokemon of pokeFavs; track pokemon.name)
            {
                <app-pokemon-card [pokemon]="pokemon" (clicBtn)="refrescar()" class="animate__animated animate__fadeIn"> </app-pokemon-card>
            }
        </div>
    }
    
</div>
