<div class="card">

  <h3 class="pokemon-name">
    {{ pokemon.name }}
  </h3>

  <img [src]="pokemon.image" [alt]="pokemon.name" />

  <div class="types">
    <span *ngFor="let type of pokemon.types">
      {{ type }}
    </span>
  </div>

  <button class="btn btn-primary" (click)="agregarFavorito()"> Agregar a Favoritos </button>

</div>
